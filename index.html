// ===== ЛОГИКА =====
let test=[],i=0,score=0,time=10,interval;

function login(){
let nick=document.getElementById("nick").value;
let vk=document.getElementById("vk").value;
let token=document.getElementById("token").value;

if(!nick||!vk){alert("Заполни всё");return;}
if(!TOKENS.includes(token)){alert("Неверный токен");return;}

document.getElementById("login").classList.add("hidden");
document.getElementById("test").classList.remove("hidden");

start();
}

function start(){
test=[...bank].sort(()=>0.5-Math.random()).slice(0,15);
i=0;score=0;
next();
}

function next(){
if(i>=test.length){finish();return;}
let q=test[i];
document.getElementById("q").innerText=q.q;
let box=document.getElementById("answers");
box.innerHTML="";
q.a.forEach(a=>{
let b=document.createElement("button");
b.innerText=a;
b.onclick=()=>check(a,q);
box.appendChild(b);
});
timer();
}

function timer(){
clearInterval(interval);
time=10;
document.getElementById("timer").innerText="⏱ "+time;
interval=setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏱ "+time;
if(time<=0){i++;next();}
},1000);
}

function check(ans,q){
clearInterval(interval);
if(ans===q.a[q.c]) score++;
i++;
next();
}

function finish(){
document.getElementById("q").innerText="Результат: "+score+"/15";
document.getElementById("answers").innerHTML="";
}

// ===== ADMIN =====
function adminLogin(){
if(document.getElementById("adminPass").value==="admin7197"){
document.getElementById("edit").classList.remove("hidden");
document.getElementById("editor").value=JSON.stringify(bank,null,2);
}
}

function save(){
bank=JSON.parse(document.getElementById("editor").value);
localStorage.setItem("bank",JSON.stringify(bank));
alert("Сохранено");
}
